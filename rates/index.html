<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>SOFR Rolling Investment Simulator</title><style>:root{font-family:Arial,sans-serif;color:#172033;background:#f5f7fb}body{margin:0}main{max-width:1100px;margin:auto;padding:32px 18px}.card{background:#fff;border:1px solid #dfe6ef;border-radius:14px;padding:20px;margin:16px 0}.grid{display:grid;grid-template-columns:repeat(3,minmax(180px,1fr));gap:14px;align-items:end}label{display:grid;gap:6px;font-weight:700}input,textarea,button{box-sizing:border-box;width:100%;padding:10px;border-radius:8px;border:1px solid #bdc8d6}button{background:#145da0;color:#fff;border:0;font-weight:700;cursor:pointer}table{width:100%;border-collapse:collapse;font-size:13px}th,td{border-bottom:1px solid #e6ebf2;padding:8px;text-align:right}th{background:#eef4fa;position:sticky;top:0}th:nth-child(-n+3),td:nth-child(-n+3){text-align:left}.scroll{max-height:520px;overflow:auto}.ok{color:#064;font-weight:700}.err{color:#900;font-weight:700}@media(max-width:720px){.grid{grid-template-columns:1fr}}</style></head><body><main><h1>SOFR Rolling Investment Simulator</h1><p>All tenors use the same monthly roll dates. Missing dates move to the previous available curve date.</p><section class="card grid"><label>Final end date<input id="analysisDate" type="date" value="2026-06-26"></label><label>Analysis period, years<input id="periodYears" type="number" min="0.25" step="0.25" value="1"></label><button onclick="runModel()">Run simulation</button></section><section class="card"><h3>Curve input</h3><p>CSV headers: <b>Date,ON,1M,2M,3M,6M</b>. Dates must be YYYY-MM-DD. Rates may be decimal or percentage.</p><textarea id="csv" rows="10"></textarea><p><button onclick="createFlatCurve()">Create sample flat curve</button></p><div id="statusBox"></div></section><section class="card"><h3>Validation</h3><div id="validation"></div></section><section class="card"><h3>Output</h3><div class="scroll"><table id="outputTable"></table></div></section></main><script src="model.js?v=20260630"></script></body></html>
