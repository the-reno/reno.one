<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Curve Roll Model</title><style>body{font-family:Arial;margin:22px;background:#f7f7f7}.card{background:white;border:1px solid #ddd;border-radius:8px;padding:14px;margin:12px 0}.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}input,textarea,button{width:100%;box-sizing:border-box;padding:8px}table{border-collapse:collapse;width:100%;font-size:12px}th,td{border:1px solid #ddd;padding:6px;text-align:right}th{background:#eee}.left{text-align:left}.scroll{max-height:420px;overflow:auto}.ok{color:#064;font-weight:700}.err{color:#900;font-weight:700}</style></head><body><h1>Curve Roll Model</h1><p>Monthly roll matrix. Last row should show all tenors settling on the analysis date.</p><div class="card"><div class="grid"><div><label>Analysis Date</label><input id="analysisDate" type="date" value="2026-06-26"></div><div><label>Period Years</label><input id="periodYears" type="number" value="1"></div><div><label>Flat Rate</label><input id="flatRate" value="1.00%"></div><div><label>Curve Start</label><input id="curveStart" type="date" value="2025-01-02"></div><div><label>Curve End</label><input id="curveEnd" type="date" value="2026-12-31"></div></div><p><button onclick="createFlatCurve()">Create Flat Curve</button><button onclick="runModel()">Run Model</button></p><div id="statusBox"></div></div><div class="card"><h3>Rates Input</h3><textarea id="csv" rows="8"></textarea></div><div class="card"><h3>Validation</h3><div id="validation"></div></div><div class="card"><h3>MonthlyAnalysis</h3><div class="scroll"><table id="monthlyTable"></table></div></div><script src="model.js?v=20260626b"></script></body></html>
